services:
  db:
    image: postgres:15-alpine
    container_name: legal_ai_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=legal_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - legal_ai_network

  redis:
    image: redis:7-alpine
    container_name: legal_ai_redis
    ports:
      - "6379:6379"
    networks:
      - legal_ai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_ai_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Legal AI Gateway
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/legal_ai
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      # - OLLAMA_MODEL=llama3.2
      - OLLAMA_MODEL=qwen2.5:7b
      - JWT_SECRET_KEY=supersecretkeyforaccesstokenrefactoring123!
      - JWT_REFRESH_SECRET_KEY=supersecretkeyforrefreshtokenrefactoring123!
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
    networks:
      - legal_ai_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_ai_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:8000
      - EXPO_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - legal_ai_network

networks:
  legal_ai_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
